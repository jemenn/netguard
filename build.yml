name: Build NetGuard Pro APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装系统依赖
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            default-jdk git zip unzip wget \
            libffi-dev libssl-dev libzbar-dev \
            python3-dev autoconf libtool \
            pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            adb

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.37
          pip install kivy requests

      - name: 缓存 Android SDK/NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer/android/platform
            ~/.buildozer/android/crystax-ndk
          key: buildozer-android-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-android-${{ runner.os }}-

      - name: 接受 Android SDK 许可证
        run: |
          mkdir -p ~/.android
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.android/analytics.settings
          yes | buildozer android debug 2>&1 | tail -20 || true

      - name: 构建 APK（正式）
        run: |
          buildozer -v android debug 2>&1 | tee build.log

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: NetGuard-Pro-APK
          path: bin/*.apk
          retention-days: 30

      - name: 上传构建日志（失败时）
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
