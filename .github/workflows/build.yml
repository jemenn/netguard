name: Build NetGuard Pro APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 缓存 buildozer 目录
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-docker-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-docker-${{ runner.os }}-

      - name: 用 Docker 构建 APK
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/home/user/hostcwd \
            -v "$HOME/.buildozer":/home/user/.buildozer \
            kivy/buildozer:latest \
            android debug 2>&1 | tee build.log
          echo "=== 查找APK ==="
          find . -name "*.apk" 2>/dev/null || echo "未找到APK"

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: NetGuard-Pro-APK
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30

      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
